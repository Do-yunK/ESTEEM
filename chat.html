<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - ESTEEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="col-12" id="header"></div>
    <div class="container py-5" style="max-width: 600px;">
        <h4 class="mb-4 text-center">Messages</h4>
        <!-- Chat List View -->
        <div id="chat-list-view">
            <div class="list-group mb-3">
                <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center chat-card" data-chat="1">
                    <div>
                        <div class="fw-bold">5 Star Renovations</div>
                        <small class="text-muted">Let's discuss hiring and scheduling.</small>
                    </div>
                    <span class="badge bg-primary rounded-pill">2</span>
                </a>
                <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center chat-card" data-chat="2">
                    <div>
                        <div class="fw-bold">Toronto Cafe</div>
                        <small class="text-muted">Contractor payment and hiring details.</small>
                    </div>
                    <span class="badge bg-secondary rounded-pill">1</span>
                </a>
            </div>
            <div class="mt-3 small text-muted text-center">Select a chat to view your messages.</div>
        </div>
        <!-- Chat Window View (hidden by default) -->
        <div id="chat-window-view" style="display:none;">
            <div class="d-flex align-items-center mb-2 gap-2 flex-wrap file-row">
                <button class="btn btn-link text-decoration-none p-0 me-2" id="back-to-list"><i class="bi bi-arrow-left"></i></button>
                <span class="fw-bold flex-grow-1" id="chat-business-name">Business Name</span>
                <button class="btn btn-outline-secondary btn-sm me-1" id="translate-btn" title="Translate"><i class="bi bi-translate"></i></button>
                <button class="btn btn-outline-secondary btn-sm me-1" id="call-btn" title="Call"><i class="bi bi-telephone"></i></button>
                <button class="btn btn-outline-secondary btn-sm me-1" id="video-btn" title="Video Call"><i class="bi bi-camera-video"></i></button>
            </div>


            <div class="card mb-3" style="height: 340px; overflow-y: auto;" id="chat-window">
                <div class="card-body d-flex flex-column gap-3" id="chat-messages">
                </div>
            </div>
            <div class="d-flex align-items-center mb-2 gap-2 flex-wrap">
                <button class="btn btn-outline-secondary btn-sm me-1" id="export-btn" title="Export Chat"><i class="bi bi-download"></i> Export</button>
                <label class="btn btn-outline-secondary btn-sm mb-0" for="insert-file-input" title="Insert File" style="display:inline-flex;align-items:center;gap:0.3rem;">
                    <i class="bi bi-paperclip"></i> Insert File
                    <input type="file" id="insert-file-input" style="display:none;">
                </label>
            </div>
            <form id="chat-form" class="d-flex gap-2 align-items-center">
                <input type="text" class="form-control" id="chat-input" placeholder="Type your message..." autocomplete="off">
                <button type="button" class="btn btn-outline-secondary" id="voice-btn" title="Voice Note"><i class="bi bi-mic"></i></button>
                <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i></button>
            </form>
            <div class="mt-2 small text-muted text-center">Discuss hiring, payment, and scheduling with your contractor. Use the translate, voice note, or video call features as needed.</div>
        </div>
    </div>
    <div class="col-12" id="menu"></div>
</body>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
<script>
    // Demo chat data
    const chatData = {
        1: {
            name: "5 Star Renovations",
            messages: [
                {from: "me", text: "Hi, I'm looking to hire a contractor. Can you tell me about the hiring process?", time: "10:01 AM"},
                {from: "business", text: "Hello! Of course. The hiring process starts with a consultation, then we discuss payment and scheduling.", time: "10:02 AM"}
            ]
        },
        2: {
            name: "Toronto Cafe",
            messages: [
                {from: "business", text: "Contractor payment details for your event.", time: "9:30 AM"},
                {from: "me", text: "Thanks! Can you send the invoice?", time: "9:31 AM"}
            ]
        }
    };
    // Demo handlers for new features
    $("#translate-btn").on("click", function() {
        alert("Translate feature coming soon! This will translate messages if accounts use different languages.");
    });
    $("#voice-btn").on("click", function() {
        alert("Voice note feature coming soon! This will let you record and send voice messages.");
    });
    $("#video-btn").on("click", function() {
        alert("Video call feature coming soon! This will let you start a video call with the contractor.");
    });

    function renderChat(chatId) {
        const chat = chatData[chatId];
        $("#chat-business-name").text(chat.name);
        const $msgs = $("#chat-messages");
        $msgs.empty();
        chat.messages.forEach(m => {
            if (m.from === "me") {
                $msgs.append(`<div class='d-flex flex-column align-items-end'><div class='bg-primary text-white rounded px-3 py-2 mb-1'>${m.text}</div><small class='text-muted'>You • ${m.time}</small></div>`);
            } else {
                $msgs.append(`<div class='d-flex flex-column align-items-start'><div class='bg-light text-dark rounded px-3 py-2 mb-1'>${m.text}</div><small class='text-muted'>${chat.name} • ${m.time}</small></div>`);
            }
        });
        $("#chat-window").scrollTop($("#chat-window")[0].scrollHeight);
    }

    $(function() {
        let currentChat = null;
        // Open chat window
        $(".chat-card").on("click", function(e) {
            e.preventDefault();
            const chatId = $(this).data("chat");
            currentChat = chatId;
            $("#chat-list-view").hide();
            $("#chat-window-view").show();
            renderChat(chatId);
        });
        // Back to chat list
        $("#back-to-list").on("click", function() {
            $("#chat-window-view").hide();
            $("#chat-list-view").show();
        });
        // Send message
        $("#chat-form").on("submit", function(e) {
            e.preventDefault();
            const msg = $("#chat-input").val().trim();
            if (!msg || !currentChat) return;
            chatData[currentChat].messages.push({from: "me", text: msg, time: "Now"});
            renderChat(currentChat);
            $("#chat-input").val("");
        });
    });
</script>
